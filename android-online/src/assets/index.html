<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HTML EDITOR</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --danger: #ef4444;
            --accent: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { min-height: 100dvh; width: 100%; font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        .state-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; width: 100%; background: var(--bg-dark); position: absolute; top: 0; left: 0; z-index: 99999; }
        
        .spinner-box { width: 64px; height: 64px; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .circle { width: 100%; height: 100%; border: 3px solid rgba(59, 130, 246, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; position: absolute; }
        .logo-svg { fill: var(--primary); filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.4)); }
        .state-screen h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 800; margin-bottom: 8px; color: var(--text-main); text-align: center; }
        .state-screen p { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; text-align: center; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .offline-card { background: var(--bg-panel); width: 100%; max-width: 340px; padding: 32px 24px; border-radius: 24px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .icon-circle { width: 60px; height: 60px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: var(--danger); }
        .offline-card h1 { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; color: var(--text-main); }
        .offline-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 28px; }
        .btn-retry { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-retry:active { transform: scale(0.96); opacity: 0.9; }

        #editor-screen { flex-direction: column; height: 100dvh; width: 100%; overflow-x: hidden; overflow-y: auto; }
        
        body.layout-split #editor-screen { overflow: hidden; }
        body.layout-split .workspace { flex: 1; min-height: 0; }
        body.layout-split .panel { flex: 1; min-height: 0; height: auto; }
        
        header, .tabs-bar, .toolbar, .panel-header, footer, .modal { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        header { background-color: var(--bg-panel); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 0.95rem; font-weight: 800; display: flex; align-items: center; gap: 6px; color: var(--text-main); text-decoration: none; flex-shrink: 0; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .history-controls { display: flex; gap: 6px; }
        .icon-btn { background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-btn:active { background: var(--border-color); transform: scale(0.95); }
        .icon-btn.disabled { opacity: 0.2; pointer-events: none; }
        
        .tabs-bar { display: flex; background-color: var(--bg-dark); border-bottom: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-muted); font-weight: 800; font-size: 0.8rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; text-transform: uppercase; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background-color: var(--bg-panel); }
        
        .toolbar { background-color: var(--bg-dark); padding: 8px 12px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--border-color); scrollbar-width: none; }
        .tool-btn { background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 6px; white-space: nowrap; text-transform: uppercase; cursor: pointer; }
        .tool-btn.primary { background: var(--primary); border: none; }
        .tool-btn.danger { color: #fca5a5; background: #450a0a; border-color: #7f1d1d; }
        
        .workspace { display: flex; flex-direction: column; }
        .panel { display: flex; flex-direction: column; height: 50dvh; position: relative; }
        .panel-header { background: var(--bg-panel); font-size: 0.65rem; color: var(--text-muted); padding: 6px 15px; text-transform: uppercase; font-weight: 800; border-bottom: 1px solid var(--border-color); border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .editor-container { display: none; flex: 1; height: 100%; flex-direction: column; }
        .editor-container.active { display: flex; }
        .fullscreen-trigger { background: transparent; border: none; color: var(--primary); font-weight: 800; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        
        #btn-sync-code { color: var(--accent); }
        .CodeMirror { flex: 1; height: 100%; font-size: 13px; background: #1a1b26 !important; }
        .preview-wrapper { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; }
        @media (orientation: landscape) { .workspace { flex-direction: row; } .panel { height: auto; flex: 1; border-right: 1px solid var(--border-color); } }
        
        footer { background: var(--bg-panel); padding: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        footer button, footer a { background: none; border: none; color: var(--text-muted); text-decoration: none; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        footer .madeby { color: var(--text-main); letter-spacing: 1px; font-weight: 800; font-size: 0.75rem; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; width: 100%; max-width: 400px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal h3 { margin-bottom: 12px; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .modal p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; max-height: 50vh; overflow-y: auto; padding-right: 5px; }
        .modal input { width: 100%; background: var(--bg-dark); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 20px; outline: none; user-select: auto; }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .modal-actions button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .btn-confirm { background: var(--primary); color: #fff; }
        .btn-cancel { background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border-color); }
        .btn-link { background: var(--bg-dark); color: var(--primary); border: 1px solid var(--border-color); padding: 14px; border-radius: 10px; text-align: center; text-decoration: none; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        
        .fs-only { display: none; }
        #preview-panel:fullscreen .no-fs { display: none; }
        #preview-panel:fullscreen .fs-only { display: flex; gap: 10px; width: 100%; justify-content: flex-end; position: absolute; z-index: 9999; top: 10px; right: 10px;}
        #preview-panel:fullscreen .panel-header { display: none !important; }
        .fs-btn { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); cursor: pointer;}
        .hide-ui .fs-only { display: none !important; }
    </style>
</head>
<body class="layout-split">

    <div id="loading-screen" class="state-screen">
        <div class="spinner-box">
            <div class="circle"></div>
            <svg class="logo-svg" width="24" height="24" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
        </div>
        <h2>Sincronizando</h2>
        <p>Preparando ambiente...</p>
    </div>

    <div id="offline-screen" class="state-screen" style="display: none;">
        <div class="offline-card">
            <div class="icon-circle">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l22 22M16.72 11.06A5 5 0 0 1 15 21H6a5 5 0 0 1-5-5 5 5 0 0 1 3-4.66L5 4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v7.06z"/></svg>
            </div>
            <h1>Sem Conexão</h1>
            <p>As bibliotecas do editor precisam ser baixadas. Verifique sua internet para continuar.</p>
            <button class="btn-retry" onclick="window.location.reload()">Tentar Novamente</button>
        </div>
    </div>

    <div id="editor-screen" style="display: none;">
        <header id="main-header">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                HTML EDITOR
            </div>
            <div class="header-right">
                <div class="history-controls">
                    <button id="undo-btn" class="icon-btn disabled"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
                    <button id="redo-btn" class="icon-btn disabled"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
                </div>
                <button id="toggle-layout" class="icon-btn">
                    <svg id="icon-free" style="display:none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                    <svg id="icon-split" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="tabs-bar">
            <button class="tab-btn active" id="tab-html">HTML</button>
            <button class="tab-btn" id="tab-css">CSS</button>
            <button class="tab-btn" id="tab-js">JS</button>
        </div>

        <div class="toolbar" id="main-toolbar">
            <button id="btn-upload" class="tool-btn">Abrir Arquivo</button>
            <button id="btn-url" class="tool-btn">Importar URL</button>
            <button id="btn-format" class="tool-btn primary">Formatar</button>
            <button id="btn-copy" class="tool-btn">Copiar</button>
            <button id="btn-clear" class="tool-btn danger">Limpar</button>
            <button id="btn-reload" class="tool-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6M3 12a9 9 0 1 0 2.63-6.37L2 8"/></svg>
                Recarregar
            </button>
        </div>

        <input type="file" id="file-input" style="display:none" accept=".html,.htm,.txt,.cjs,.htmls,.js,.css">

        <main class="workspace">
            <section class="panel">
                <div class="panel-header">
                    <span id="current-editor-title">Código HTML</span>
                    <button class="fullscreen-trigger" id="btn-sync-code" style="display: none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                        COPIAR SITE
                    </button>
                </div>
                <div class="editor-container active" id="wrap-html"><textarea id="editor-html"></textarea></div>
                <div class="editor-container" id="wrap-css"><textarea id="editor-css"></textarea></div>
                <div class="editor-container" id="wrap-js"><textarea id="editor-js"></textarea></div>
            </section>

            <section class="panel" id="preview-panel">
                <div class="fs-only">
                    <button id="fs-hide" class="fs-btn hide-ui-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg></button>
                    <button id="fs-close" class="fs-btn close-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                </div>
                <div class="panel-header" id="preview-header">
                    <span class="no-fs">Preview</span>
                    <div class="no-fs" style="display: flex; gap: 10px; align-items: center;">
                        <button class="fullscreen-trigger" id="btn-get-html">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="10" y1="13" x2="8" y2="15"/><line x1="8" y1="15" x2="10" y2="17"/><line x1="14" y1="13" x2="16" y2="15"/><line x1="16" y1="15" x2="14" y2="17"/></svg>
                            PEGAR HTML
                        </button>
                        <button class="fullscreen-trigger" id="btn-fullscreen">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                            TELA CHEIA
                        </button>
                    </div>
                </div>
                <div class="preview-wrapper"><iframe id="preview-iframe" sandbox="allow-scripts allow-modals allow-pointer-lock allow-same-origin"></iframe></div>
            </section>
        </main>

        <footer>
            <button id="open-terms">Termos & Privacidade</button>
            <button id="btn-madeby" class="madeby">MADE BY LP</button>
        </footer>

        <div id="modal-overlay" class="modal-overlay">
            <div class="modal" id="modal-content">
                <h3 id="modal-title"></h3>
                <p id="modal-text"></p>
                <div id="modal-input-container"></div>
                <div class="modal-actions" id="modal-buttons"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-html.min.js"></script>

    <script>
        let editorHtml, editorCss, editorJs, activeEditor;
        let timeout;
        let stagedCode = "";

        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const modalButtons = document.getElementById('modal-buttons');
        const modalInputContainer = document.getElementById('modal-input-container');

        const termosTexto = `<b>1. SOBRE O APLICATIVO</b><br>O HTML Editor (Online) é uma ferramenta de código aberto voltada para a criação, edição e teste de códigos web em tempo real.<br><br><b>2. PRIVACIDADE E DADOS</b><br>Todo o código digitado ou importado é processado e salvo localmente no seu dispositivo (LocalStorage). O aplicativo não coleta, monitora ou envia seus projetos para servidores externos.<br><br><b>3. USO DA REDE</b><br>Esta versão utiliza a internet exclusivamente para carregar bibliotecas de terceiros (CDNs) e permitir a extração de código via URL. <br><br><b>4. RESPONSABILIDADE</b><br>O usuário é o único responsável pelo código que insere, importa ou executado.`;
        const privTexto = `<b>POLÍTICA DE PRIVACIDADE</b><br><br>Este aplicativo valoriza sua privacidade. Sendo uma ferramenta de uso client-side, <b>nenhum dado pessoal ou código-fonte é transmitido para nossos servidores</b>.<br><br><b>Armazenamento Local:</b> Utilizamos o LocalStorage do seu dispositivo.<br><br><b>Links Externos:</b> Ao utilizar a função "Importar URL", as políticas dessa requisição seguem os termos do site importado.`;

        function closeModal() { modalOverlay.classList.remove('active'); modalText.style.textAlign = "center"; }
        function customAlert(title, text) { modalTitle.innerText = title; modalText.innerHTML = text; modalText.style.textAlign = "center"; modalInputContainer.innerHTML = ''; modalButtons.innerHTML = `<button class="btn-confirm" onclick="closeModal()">OK</button>`; modalOverlay.classList.add('active'); }
        function customConfirm(title, text, onConfirm) { modalTitle.innerText = title; modalText.innerHTML = text; modalText.style.textAlign = "center"; modalInputContainer.innerHTML = ''; modalButtons.innerHTML = `<button class="btn-confirm" id="modal-confirm-btn">Confirmar</button><button class="btn-cancel" onclick="closeModal()">Cancelar</button>`; modalOverlay.classList.add('active'); document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); }; }
        function openExternal(url) { customConfirm("Abrir Link", "Deseja sair do aplicativo para abrir o GitHub?", () => { if (window.Android && window.Android.openUrl) { window.Android.openUrl(url); } else { window.open(url, '_blank'); } }); }

        function updateHistoryButtons() { document.getElementById('undo-btn').classList.toggle('disabled', activeEditor.historySize().undo === 0); document.getElementById('redo-btn').classList.toggle('disabled', activeEditor.historySize().redo === 0); }

        function updatePreview() {
            localStorage.setItem('html_code', editorHtml.getValue());
            localStorage.setItem('css_code', editorCss.getValue());
            localStorage.setItem('js_code', editorJs.getValue());
            let html = editorHtml.getValue();
            let css = editorCss.getValue();
            let js = editorJs.getValue();
            if (!html.toLowerCase().includes('charset')) html = html.replace('<head>', '<head>\n<meta charset="utf-8">');
            let finalCode = html + "<style>\n" + css + "\n</style><script>\n" + js + "\n<\/script>";
            const doc = document.getElementById("preview-iframe").contentDocument;
            doc.open(); doc.write(finalCode); doc.close();
            updateHistoryButtons();
        }

        function initEditorApp() {
            editorHtml = CodeMirror.fromTextArea(document.getElementById("editor-html"), { mode: "htmlmixed", theme: "dracula", lineNumbers: true, lineWrapping: true, autoCloseTags: true });
            editorCss = CodeMirror.fromTextArea(document.getElementById("editor-css"), { mode: "css", theme: "dracula", lineNumbers: true, lineWrapping: true, autoCloseTags: true });
            editorJs = CodeMirror.fromTextArea(document.getElementById("editor-js"), { mode: "javascript", theme: "dracula", lineNumbers: true, lineWrapping: true, autoCloseTags: true });

            activeEditor = editorHtml;

            const tabs = { "tab-html": { wrap: "wrap-html", title: "Código HTML", editor: editorHtml }, "tab-css": { wrap: "wrap-css", title: "Código CSS", editor: editorCss }, "tab-js": { wrap: "wrap-js", title: "Código JS", editor: editorJs } };
            Object.keys(tabs).forEach(id => {
                document.getElementById(id).onclick = () => {
                    document.querySelectorAll('.tab-btn, .editor-container').forEach(el => el.classList.remove('active'));
                    document.getElementById(id).classList.add('active');
                    document.getElementById(tabs[id].wrap).classList.add('active');
                    document.getElementById("current-editor-title").innerText = tabs[id].title;
                    activeEditor = tabs[id].editor;
                    setTimeout(() => activeEditor.refresh(), 10);
                    updateHistoryButtons();
                };
            });

            [editorHtml, editorCss, editorJs].forEach(ed => ed.on("change", () => { clearTimeout(timeout); timeout = setTimeout(updatePreview, 400); }));

            document.getElementById('undo-btn').onclick = () => activeEditor.undo();
            document.getElementById('redo-btn').onclick = () => activeEditor.redo();
            document.getElementById('btn-reload').onclick = () => updatePreview();
            
            document.getElementById("toggle-layout").onclick = () => { 
                const isSplit = document.body.classList.toggle("layout-split"); 
                document.getElementById('icon-free').style.display = isSplit ? 'none' : 'block'; 
                document.getElementById('icon-split').style.display = isSplit ? 'block' : 'none'; 
                setTimeout(() => [editorHtml, editorCss, editorJs].forEach(ed => ed.refresh()), 100); 
            };
            
            document.getElementById('btn-fullscreen').onclick = () => { const p = document.getElementById('preview-panel'); if (p.requestFullscreen) p.requestFullscreen(); };
            document.getElementById('fs-close').onclick = () => document.exitFullscreen();
            document.getElementById('fs-hide').onclick = () => document.body.classList.toggle('hide-ui');
            document.getElementById('btn-upload').onclick = () => document.getElementById('file-input').click();
            
            document.getElementById('file-input').onchange = (e) => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => activeEditor.setValue(ev.target.result); r.readAsText(f); };

            window.onBackgroundExtract = function(code) {
                if(code && code !== editorHtml.getValue()) {
                    stagedCode = code;
                    document.getElementById('btn-sync-code').style.display = 'flex';
                }
            };

            document.getElementById('btn-sync-code').onclick = () => {
                if(stagedCode) {
                    document.getElementById("tab-html").click(); 
                    editorHtml.setValue(stagedCode);
                    stagedCode = "";
                    document.getElementById('btn-sync-code').style.display = 'none';
                    customAlert("Sucesso", "O código HTML desta página foi copiado para o editor!");
                }
            };

            document.getElementById('btn-get-html').onclick = () => {
                try {
                    const doc = document.getElementById("preview-iframe").contentDocument;
                    if (doc && doc.documentElement) {
                        let extracted = "<!DOCTYPE html>\n<html lang=\"pt-br\">\n" + doc.documentElement.innerHTML + "\n</html>";
                        editorHtml.setValue(html_beautify(extracted, { indent_size: 2 }));
                        document.getElementById("tab-html").click();
                    }
                } catch (e) { customAlert("Erro", "Bloqueio de segurança (CORS)."); }
            };

            window.onUrlFetched = function(code) {
                if (code === "ERRO_INSTALACAO") customAlert("Aviso", "A extração nativa falhou. Tente novamente.");
                else if (code === "ERRO_CHAMADA" || code === "ERRO_CANCELADO") customAlert("Aviso", "A extração foi cancelada ou ocorreu um erro de conexão.");
                else { document.getElementById("tab-html").click(); activeEditor.setValue(code); stagedCode = ""; document.getElementById('btn-sync-code').style.display = 'none'; }
                closeModal();
            };

            document.getElementById('btn-url').onclick = () => {
                modalTitle.innerText = "Importar URL"; modalText.innerText = "Insira o link:";
                modalInputContainer.innerHTML = `<input type="url" id="modal-prompt-input" placeholder="https://">`;
                modalButtons.innerHTML = `<button class="btn-confirm" id="modal-confirm-btn">Importar</button><button class="btn-cancel" onclick="closeModal()">Cancelar</button>`;
                modalOverlay.classList.add('active');
                document.getElementById('modal-confirm-btn').onclick = () => {
                    let url = document.getElementById('modal-prompt-input').value.trim();
                    if (url) { 
                        const finalUrl = /^[a-zA-Z]+:\/\//i.test(url) ? url : "https://" + url;
                        if (window.Android && window.Android.fetchUrl) { window.Android.fetchUrl(finalUrl); } 
                        else { fetch(finalUrl).then(r => r.text()).then(c => activeEditor.setValue(c)); } 
                    }
                    closeModal();
                };
            };

            document.getElementById("btn-format").onclick = () => activeEditor.setValue(html_beautify(activeEditor.getValue(), { indent_size: 2 }));
            document.getElementById("btn-copy").onclick = () => { navigator.clipboard.writeText(activeEditor.getValue()); customAlert("Sucesso", "Copiado!"); };
            document.getElementById("btn-clear").onclick = () => customConfirm("Limpar", "Apagar tudo?", () => activeEditor.setValue(""));
            document.getElementById('open-terms').onclick = () => { customAlert("Termos", termosTexto); };
            document.getElementById('btn-madeby').onclick = () => openExternal('https://github.com/lp77-br/html-viewer');

            editorHtml.setValue(localStorage.getItem('html_code') || '<!DOCTYPE html>\n<html><body><h1>Olá Mundo</h1></body></html>');
            editorCss.setValue(localStorage.getItem('css_code') || '');
            editorJs.setValue(localStorage.getItem('js_code') || '');
            updatePreview();
        }

        window.onload = () => {
            const loadingScreen = document.getElementById('loading-screen');
            const offlineScreen = document.getElementById('offline-screen');
            const editorScreen = document.getElementById('editor-screen');

            if (typeof CodeMirror === 'undefined') {
                loadingScreen.style.display = 'none';
                offlineScreen.style.display = 'flex';
            } else {
                loadingScreen.style.display = 'none';
                editorScreen.style.display = 'flex';
                initEditorApp();
            }
        };
    </script>
</body>
</html>
